<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header-content">
      <div class="header-esquerda">
        <div class="logo">
          <strong>Renda</strong><span>Control</span>
        </div>
        <nav class="navegacao">
          <ul>
            <li><a href="dashboard.html" class="ativo">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="despesas.html">Financeiro</a></li>
            <li><a href="relatorio.html">Relatórios</a></li>
          </ul>
        </nav>
      </div>
      <div class="header-direita">
        <button class="botao-logout">LOGOUT</button>
      </div>
    </div>
  </header>

  <main class="dashboard">
    <div class="dashboard-topo">
      <div>
        <h1 class="dashboard-titulo" id="saudacao">Bom dia!</h1>
        <p class="dashboard-subtitulo" id="subtitulo-data">Resumo financeiro</p>
      </div>
      <a href="servico.html" class="btn-salvar">+ Novo serviço</a>
    </div>

    <!-- Cards -->
    <section class="resumo-grade resumo-grade-3">
      <div class="resumo-cartao">
        <p class="resumo-label">Despesas</p>
        <span class="resumo-valor destaque-vermelho" id="card-despesas">--</span>
        <span class="resumo-detalhe" id="card-despesas-detalhe">--</span>
      </div>
      <div class="resumo-cartao">
        <p class="resumo-label">Lucro Líquido</p>
        <span class="resumo-valor destaque-verde" id="card-lucro">--</span>
        <span class="resumo-detalhe" id="card-lucro-detalhe">--</span>
      </div>
      <div class="resumo-cartao">
        <p class="resumo-label">Cobranças Pendentes</p>
        <span class="resumo-valor destaque-amarelo" id="card-pendentes">--</span>
        <span class="resumo-detalhe" id="card-pendentes-detalhe">--</span>
      </div>
    </section>

    <section class="dashboard-conteudo">

      <!-- Serviços recentes -->
      <div class="painel painel-largo">
        <h2 class="painel-title">Serviços Recentes</h2>
        <div class="tabela-container">
          <table class="tabela-clientes">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Serviço</th>
                <th>Valor</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tabela-servicos-recentes">
            </tbody>
          </table>
        </div>
      </div>

    </section>

    <!-- Atividade recente -->
    <div class="painel">
      <h2 class="painel-title">Atividade Recente</h2>
      <div id="atividade-recente"></div>
    </div>

  </main>

  <script src="dashboard.js"></script>
</body>

</html>
